<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <!-- Make asset loading and client-side routes resolve from /baseviewer/ -->
  <base href="/baseviewer/">
  <title>Velvedeer — Base Viewer (Demo)</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; padding: 1rem; }
    #grid { display:flex; gap:1rem; flex-wrap:wrap; }
    .card { border:1px solid #ddd; padding:0.5rem; width:140px; text-align:center; }
    button{ margin-top:0.5rem; }
  </style>
</head>
<body>
  <h1>Velvedeer — Breeding demo</h1>
  <p>Pick two parents and click "Breed". Offspring appears below.</p>

  <div id="grid"></div>

  <div style="margin-top:1rem">
    <button id="spawn">Spawn 6 random</button>
    <button id="breedBtn" disabled>Breed Selected</button>
  </div>

  <h2>Offspring</h2>
  <div id="offspring"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
