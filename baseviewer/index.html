<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <base href="/baseviewer/">
  <title>Velvedeer — Breeding</title>
  <style>
    /* Layout */
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; padding: 1rem; background:#f7f7fb; color:#111 }

    /* overall centered column */
    .centered-area { display:flex; flex-direction:column; align-items:center; gap:16px; }

    /* parents row */
    .panel-row { display:flex; gap:1rem; align-items:flex-start; flex-wrap:wrap; justify-content:center; }

    .panel { border:1px solid #e3e6ee; padding:1rem; width:320px; border-radius:8px; background:#fff; box-shadow:0 1px 2px rgba(16,24,40,0.02); }
    .panel h3 { margin:0 0 8px 0; font-size:16px; text-align:center; }
    .traits { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
    .controls { margin-top:8px; display:flex; gap:8px; align-items:center; }
    .small { font-size:12px; color:#444; }
    label { display:block; font-size:12px; color:#333; margin-bottom:4px; }
    select, input[type="number"], button { width:100%; padding:7px; border-radius:6px; border:1px solid #d1d5db; background:white; box-sizing:border-box; }
    button.primary { background:#2563eb; color:white; border:none; cursor:pointer; padding:8px 10px; }
    button.secondary { background:#f3f4f6; color:#111; border:1px solid #e5e7eb; cursor:pointer; }
    .muted { color:#666; font-size:12px; }

    /* avatar small (for parent cards) */
    .avatar {
      position: relative;
      width: 240px;
      height: 240px;
      display: inline-block;
      background: transparent;
      margin-bottom: 10px;
      background-size: cover;
      background-position: center;
    }
    .avatar img.layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      image-rendering: auto;
      user-select: none;
    }

    /* Large centered image area (640x640) - optional main preview */
    .image-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-direction: column;
    }
    .image-area {
      width: 640px;
      height: 640px;
      background: #ffffff;
      border: 1px solid #e3e6ee;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 4px 12px rgba(16,24,40,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* main canvas (avatar-large) uses same stacking but covers the area */
    .avatar-large {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: inline-block;
      pointer-events: none;
      background-size: cover;
      background-position: center;
    }
    .avatar-large img.layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      image-rendering: auto;
    }

    /* Breed controls centered */
    .breed-center {
      width: 100%;
      max-width: calc(320px * 2 + 1rem);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
      margin-bottom: 6px;
    }
    .breed-center .count-wrap { width: 160px; max-width:40%; }
    .breed-center .btn-wrap { width: 160px; max-width:40%; }

    /* Offspring centering */
    .offspring-area { width: 100%; display:flex; justify-content:center; margin-top:1rem; }
    #offspring { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; max-width: calc(320px * 2 + 1rem); margin: 0 auto; }

    /* Card styles (text fallback) */
    .card { border:1px solid #e6e9f0; padding:0.6rem; width:180px; text-align:left; border-radius:8px; background:#fff; box-shadow:0 1px 1px rgba(16,24,40,0.02); }
    .card .title { font-weight:600; margin-bottom:6px; }
    .card .traits-list { font-size:13px; color:#333; line-height:1.3; }

    /* Responsive */
    @media (max-width: 700px) {
      .panel { width: 100%; max-width: 420px; }
      .breed-center { max-width: 420px; padding: 0 12px; box-sizing: border-box; }
      .breed-center .count-wrap, .breed-center .btn-wrap { width: 50%; }
      .image-area { width: min(90vw, 640px); height: min(90vw, 640px); }
      .avatar { width: min(75vw, 240px); height: min(75vw, 240px); }
    }
  </style>

  <!--
    Backend integration note:
    The backend should inject the background URL when serving the page if you want a backdrop for avatars.
    Example server-side injection (must be placed BEFORE the main.js import below):
      <script>window.BV_CONFIG = { background: "/baseviewer/assets/backgrounds/bg1.png" };</script>

    Alternatively you can call window.setBVBackground(url) later (after main.js loads) to change it dynamically.
  -->
</head>
<body>
  <h1>Velvedeer — Breeding configurator</h1>

  <div class="centered-area">
    <!-- Parent panels centered above the image/preview area -->
    <div class="panel-row" role="region" aria-label="Parents panels">
      <div class="panel" id="parentA-panel">
        <h3>Parent A</h3>
        <div id="parentA-card" style="margin:0 auto 10px; display:flex; justify-content:center;"></div>
        <div class="traits" id="parentA-traits" aria-hidden="false"></div>
        <div class="controls">
          <button id="createA" class="primary">Create Parent A</button>
          <button id="randomA" class="secondary" type="button">Random</button>
        </div>
      </div>

      <div class="panel" id="parentB-panel">
        <h3>Parent B</h3>
        <div id="parentB-card" style="margin:0 auto 10px; display:flex; justify-content:center;"></div>
        <div class="traits" id="parentB-traits" aria-hidden="false"></div>
        <div class="controls">
          <button id="createB" class="primary">Create Parent B</button>
          <button id="randomB" class="secondary" type="button">Random</button>
        </div>
      </div>
    </div>

    <!-- breed controls centered -->
    <div class="breed-center" role="region" aria-label="Breed controls">
      <div class="count-wrap">
        <label class="small" for="offspringCount" style="margin-bottom:6px; display:block; text-align:center;">Number of offspring</label>
        <input id="offspringCount" type="number" min="1" value="3" />
      </div>
      <div class="btn-wrap" style="display:flex; align-items:center; justify-content:center;">
        <button id="breedBtn" class="primary" disabled style="width:100%;">Breed</button>
      </div>
    </div>

    <!-- Optional large centered preview (kept hidden unless you want it visible) -->
    <div class="image-wrapper" aria-hidden="true" style="display:none;">
      <div class="image-area" id="image-area" title="Background + deer preview">
        <div id="main-canvas" class="avatar-large" aria-hidden="false"></div>
      </div>
    </div>
  </div>

  <div style="text-align:center; width:100%;">
    <h2 style="margin-top:1rem">Offspring</h2>
  </div>

  <div class="offspring-area" aria-live="polite" aria-label="Offspring previewer">
    <div id="offspring"></div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
