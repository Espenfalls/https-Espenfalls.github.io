<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <!-- Make asset loading and client-side routes resolve from /baseviewer/ -->
  <base href="/baseviewer/">
  <title>Velvedeer — Breeding</title>
  <style>
    /* Layout */
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; padding: 1rem; background:#f7f7fb; color:#111 }
    .container { display:flex; gap:1rem; align-items:flex-start; flex-wrap:wrap; }
    .panel { border:1px solid #e3e6ee; padding:1rem; width:320px; border-radius:8px; background:#fff; box-shadow:0 1px 2px rgba(16,24,40,0.02); }
    .panel h3 { margin:0 0 8px 0; font-size:16px; }
    .traits { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
    .controls { margin-top:8px; display:flex; gap:8px; align-items:center; }
    #offspring { margin-top:1rem; display:flex; gap:8px; flex-wrap:wrap; }
    .card { border:1px solid #e6e9f0; padding:0.6rem; width:180px; text-align:left; border-radius:8px; background:#fff; box-shadow:0 1px 1px rgba(16,24,40,0.02); }
    .small { font-size:12px; color:#444; }
    label { display:block; font-size:12px; color:#333; margin-bottom:4px; }
    select, input[type="number"], button { width:100%; padding:7px; border-radius:6px; border:1px solid #d1d5db; background:white; box-sizing:border-box; }
    button.primary { background:#2563eb; color:white; border:none; cursor:pointer; padding:8px 10px; }
    button.secondary { background:#f3f4f6; color:#111; border:1px solid #e5e7eb; cursor:pointer; }
    .muted { color:#666; font-size:12px; }

    /* Avatar layering styles */
    .avatar {
      position: relative;
      width: 240px;
      height: 240px;
      display: inline-block;
      background: transparent;
    }
    .avatar img.layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      image-rendering: auto;
      user-select: none;
    }

    /* Card inner layout */
    .card .title { font-weight:600; margin-bottom:6px; }
    .card .traits-list { font-size:13px; color:#333; line-height:1.3; }
  </style>
</head>
<body>
  <h1>Velvedeer — Breeding configurator</h1>

  <div class="container">
    <div class="panel" id="parentA-panel">
      <h3>Parent A</h3>
      <div class="traits" id="parentA-traits" aria-hidden="false"></div>
      <div class="controls">
        <button id="createA" class="primary">Create Parent A</button>
        <button id="randomA" class="secondary" type="button">Random</button>
      </div>
      <div id="parentA-card" style="margin-top:12px"></div>
    </div>

    <div class="panel" id="parentB-panel">
      <h3>Parent B</h3>
      <div class="traits" id="parentB-traits" aria-hidden="false"></div>
      <div class="controls">
        <button id="createB" class="primary">Create Parent B</button>
        <button id="randomB" class="secondary" type="button">Random</button>
      </div>
      <div id="parentB-card" style="margin-top:12px"></div>
    </div>

    <div class="panel" id="breed-panel" style="width:220px">
      <h3>Breed</h3>
      <label class="small">Number of offspring</label>
      <input id="offspringCount" type="number" min="1" value="3" />
      <div style="margin-top:8px" class="controls">
        <button id="breedBtn" class="primary" disabled>Breed</button>
      </div>
      <div style="margin-top:8px" class="muted small">Create both parents to enable breeding.</div>
    </div>
  </div>

  <h2 style="margin-top:1rem">Offspring</h2>
  <div id="offspring" aria-live="polite"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
